name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_COLOR: 2

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # windows
          - os: windows-2022
            arch: x64
          - os: windows-2025
            arch: x64
          - os: windows-2022
            arch: x86
          - os: windows-11-arm
            arch: arm64
          # macos
          - os: macos-15-intel
            arch: x64
          - os: macos-14
            arch: arm64
          # linux
          - os: ubuntu-22.04
            arch: x64
          - os: ubuntu-24.04
            arch: x64
          - os: ubuntu-22.04-arm
            arch: arm64
          - os: ubuntu-24.04-arm
            arch: arm64
        node: [20, 22, 24]

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          architecture: ${{ matrix.arch }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run tests
        run: npm test
